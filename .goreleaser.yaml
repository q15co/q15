version: 2
project_name: q15-auth

builds:
  - id: q15-auth
    dir: systems/agent
    main: ./cmd/q15-auth
    binary: q15-auth
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: q15-auth
    ids:
      - q15-auth
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github-native
  sort: asc

release:
  draft: false
  replace_existing_draft: true
