version: 2
project_name: q15

builds:
  - id: q15
    dir: systems/agent
    main: .
    binary: q15
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath

  - id: q15-sandbox-helper
    dir: systems/sandbox-helper
    main: .
    binary: q15-sandbox-helper
    env:
      - CGO_ENABLED=1
    tags:
      - containers_image_openpgp
      - exclude_graphdriver_btrfs
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath

archives:
  - id: q15-linux
    ids:
      - q15
      - q15-sandbox-helper
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - artifacts: archive

changelog:
  use: github-native
  sort: asc

release:
  draft: false
  replace_existing_draft: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"
