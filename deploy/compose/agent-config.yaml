providers:
  - name: ollama-cloud
    type: ollama
    base_url: https://ollama.com
    key_env: OLLAMA_API_KEY

models:
  - name: kimi-k2.7-code
    provider: ollama-cloud
    provider_model: kimi-k2.7-code:cloud
    capabilities: [text, tool_calling, reasoning, image_input]

  - name: nemotron-3-ultra
    provider: ollama-cloud
    provider_model: nemotron-3-ultra:cloud
    capabilities: [text, tool_calling, reasoning]

  - name: minimax-m3
    provider: ollama-cloud
    provider_model: minimax-m3:cloud
    capabilities: [text, tool_calling, reasoning, image_input]

  - name: deepseek-v4-flash
    provider: ollama-cloud
    provider_model: deepseek-v4-flash:cloud
    capabilities: [text, tool_calling, reasoning]

  - name: deepseek-v4-pro
    provider: ollama-cloud
    provider_model: deepseek-v4-pro:cloud
    capabilities: [text, tool_calling, reasoning]

  - name: kimi-k2.6
    provider: ollama-cloud
    provider_model: kimi-k2.6:cloud
    capabilities: [text, tool_calling, reasoning, image_input]

  - name: glm-5.1
    provider: ollama-cloud
    provider_model: glm-5.1:cloud
    capabilities: [text, tool_calling, reasoning]

  - name: minimax-m2.7
    provider: ollama-cloud
    provider_model: minimax-m2.7:cloud
    capabilities: [text, tool_calling, reasoning]

agent:
  name: Q15
  models:
    - minimax-m3
    - kimi-k2.7-code
    - nemotron-3-ultra
    - deepseek-v4-flash
    - deepseek-v4-pro
    - kimi-k2.6
    - glm-5.1
    - minimax-m2.7
  cognition:
    models:
      - kimi-k2.7-code
      - nemotron-3-ultra
      - minimax-m3
      - deepseek-v4-flash
  memory_recent_turns: 6
  tools:
    web_search:
      brave_api_key_env: BRAVE_API_KEY
    embeddings:
      qdrant_url_env: Q15_QDRANT_URL
      gemini_api_key_env: Q15_GEMINI_API_KEY
      model: gemini-embedding-2
      dimensions: 768
  telegram:
    token_env: Q15_TELEGRAM_TOKEN
    allowed_user_ids_env: Q15_TELEGRAM_ALLOWED_USER_IDS
