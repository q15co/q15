providers:
  - name: openai
    type: openai-codex

  - name: moonshot
    type: openai-compatible
    base_url: https://api.moonshot.ai/v1
    key_env: MOONSHOT_API_KEY

  - name: zai
    type: openai-compatible
    base_url: https://api.z.ai/api/coding/paas/v4
    key_env: ZAI_API_KEY

models:
  - name: gpt-5.5
    provider: openai
    capabilities: [text, tool_calling, reasoning, image_input]

  - name: glm-5-turbo
    provider: zai
    capabilities: [text, tool_calling, reasoning]

  - name: kimi-k2.6
    provider: moonshot
    capabilities: [text, tool_calling, reasoning, image_input]

agent:
  name: Q15
  models:
    - glm-5-turbo
    - gpt-5.5
    - kimi-k2.6
  cognition:
    models:
      - kimi-k2.6
      - gpt-5.5
  memory_recent_turns: 6
  tools:
    web_search:
      brave_api_key_env: BRAVE_API_KEY
    embeddings:
      qdrant_url_env: Q15_QDRANT_URL
      gemini_api_key_env: Q15_GEMINI_API_KEY
      model: gemini-embedding-2
      dimensions: 768
  telegram:
    token_env: Q15_TELEGRAM_TOKEN
    allowed_user_ids_env: Q15_TELEGRAM_ALLOWED_USER_IDS
