# Model discovery configuration.
#
# Providers manage their own models. The agent queries each provider's roster
# endpoint at startup (and refreshes periodically) to discover available models.
# There is no hand-typed models: list — the provider roster IS the model config.
#
# agent.provider + agent.model seed the current interactive provider/model
# pair. agent.model is the tag-stripped provider model id. The agent can list
# and switch live models at runtime with list_providers/list_models/switch_model;
# switches are persisted and survive restart. Background cognition jobs inherit
# the interactive model unless switch_cognition_model targets a specific job.
# Each path tries its configured model first, then falls through to other
# roster models.

providers:
  - name: ollama-cloud
    type: ollama
    base_url: https://ollama.com
    key_env: OLLAMA_API_KEY
    discovery:
      models_dev: true

agent:
  name: Q15
  memory_recent_turns: 6
  tools:
    web_search:
      brave_api_key_env: BRAVE_API_KEY
    embeddings:
      qdrant_url_env: Q15_QDRANT_URL
      gemini_api_key_env: Q15_GEMINI_API_KEY
      model: gemini-embedding-2
      dimensions: 768
  telegram:
    token_env: Q15_TELEGRAM_TOKEN
    allowed_user_ids_env: Q15_TELEGRAM_ALLOWED_USER_IDS
