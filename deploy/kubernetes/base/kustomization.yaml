apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: q15-agent-config
    files:
      - config.yaml=agent-config.yaml
  - name: q15-proxy-policy
    files:
      - policy.yaml=proxy-policy.yaml

resources:
  - agent-deployment.yaml
  - exec-service-deployment.yaml
  - proxy-service-deployment.yaml
  - services.yaml
