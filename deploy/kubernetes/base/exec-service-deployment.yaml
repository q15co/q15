apiVersion: apps/v1
kind: Deployment
metadata:
  name: q15-exec-service
  labels:
    app.kubernetes.io/name: q15-exec-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: q15-exec-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: q15-exec-service
    spec:
      containers:
        - name: exec-service
          image: q15-exec-service:latest
          ports:
            - name: grpc
              containerPort: 50051
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: memory
              mountPath: /memory
            - name: skills
              mountPath: /skills
            - name: nix
              mountPath: /nix
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: q15-workspace
        - name: memory
          persistentVolumeClaim:
            claimName: q15-memory
        - name: skills
          persistentVolumeClaim:
            claimName: q15-skills
        - name: nix
          persistentVolumeClaim:
            claimName: q15-exec-nix
