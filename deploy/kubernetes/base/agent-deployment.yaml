apiVersion: apps/v1
kind: Deployment
metadata:
  name: q15-agent
  labels:
    app.kubernetes.io/name: q15-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: q15-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: q15-agent
    spec:
      containers:
        - name: agent
          image: ghcr.io/q15co/q15-agent:main
          env:
            - name: HOME
              value: /root
            - name: GODEBUG
              value: updatemaxprocs=0
            - name: GOMAXPROCS
              value: "1"
            - name: TZ
              value: Europe/Berlin
          envFrom:
            - secretRef:
                name: q15-agent-env
          volumeMounts:
            - name: agent-config
              mountPath: /etc/q15/agent
              readOnly: true
            - name: agent-auth
              mountPath: /etc/q15/auth
              readOnly: true
            - name: workspace
              mountPath: /workspace
            - name: memory
              mountPath: /memory
            - name: media
              mountPath: /media
            - name: skills
              mountPath: /skills
      volumes:
        - name: agent-config
          configMap:
            name: q15-agent-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: agent-auth
          secret:
            secretName: q15-agent-auth
            items:
              - key: auth.json
                path: auth.json
        - name: workspace
          persistentVolumeClaim:
            claimName: q15-workspace
        - name: memory
          persistentVolumeClaim:
            claimName: q15-memory
        - name: media
          persistentVolumeClaim:
            claimName: q15-media
        - name: skills
          persistentVolumeClaim:
            claimName: q15-skills
