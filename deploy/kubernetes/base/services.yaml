apiVersion: v1
kind: Service
metadata:
  name: q15-exec
  labels:
    app.kubernetes.io/name: q15-exec
spec:
  selector:
    app.kubernetes.io/name: q15-exec
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: q15-proxy
  labels:
    app.kubernetes.io/name: q15-proxy
spec:
  selector:
    app.kubernetes.io/name: q15-proxy
  ports:
    - name: proxy
      port: 18080
      targetPort: proxy
    - name: admin
      port: 50052
      targetPort: admin
