# q15 starter config
# Uncomment and edit the blocks below to configure a single agent.
#
# For env-backed secrets, set provider.key_env / agent.telegram.token_env to
# variable names available in your runtime environment (for example q15.env).
#
# [skills]
# local_dir = "/skills"
#
# [[provider]]
# name = "openai-sub"
# type = "openai-codex"
#
# [[model]]
# name = "codex-primary"
# provider = "openai-sub"
# provider_model = "gpt-5-codex"
# capabilities = ["text", "tool_calling", "reasoning"]
# If omitted, q15 currently assumes ["text"] only. Add tool_calling,
# image_input, and reasoning explicitly per model as supported.
#
# [agent]
# name = "Jared"
# models = ["codex-primary"]
# memory_recent_turns = 6
#
# [agent.workspace]
# local_dir = "/workspace"
#
# q15-exec-service is required for command execution. Proxy-backed auth env
# injection now lives behind q15-proxy-service and q15-exec-service.
# [agent.execution]
# service_address = "127.0.0.1:50051"
#
# [agent.telegram]
# token_env = "JARED_TELEGRAM_TOKEN"
# allowed_user_ids = [123456789]
