# Local-development stack. For image-only deployment consumption, see
# deploy/compose/docker-compose.image-first.yml.
services:
  q15-proxy:
    image: ghcr.io/q15co/q15-proxy:main
    build:
      context: .
      dockerfile: docker/proxy.Dockerfile
    restart: unless-stopped
    init: true
    environment:
      GITHUB_TOKEN_FILE: /run/secrets/github_token
    configs:
      - source: q15_proxy_policy
        target: /etc/q15/proxy/policy.yaml
    volumes:
      - type: volume
        source: q15_proxy_state
        target: /var/lib/q15/proxy
    secrets:
      - github_token

  q15-exec:
    image: ghcr.io/q15co/q15-exec:main
    build:
      context: .
      dockerfile: docker/exec.Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      - q15-proxy
    environment:
      TZ: Europe/Berlin
    volumes:
      - type: volume
        source: q15_workspace
        target: /workspace
      - type: volume
        source: q15_memory
        target: /memory
      - type: volume
        source: q15_media
        target: /media
      - type: volume
        source: q15_skills
        target: /skills
      - type: volume
        source: q15_exec_nix_store
        target: /nix

  q15-qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    init: true
    volumes:
      - type: volume
        source: q15_qdrant_storage
        target: /qdrant/storage

  q15-agent:
    image: ghcr.io/q15co/q15-agent:main
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      - q15-exec
      - q15-qdrant
    environment:
      HOME: /root
      GODEBUG: updatemaxprocs=0
      GOMAXPROCS: "1"
      TZ: Europe/Berlin
      MOONSHOT_API_KEY_FILE: /run/secrets/moonshot_api_key
      ZAI_API_KEY_FILE: /run/secrets/zai_api_key
      Q15_TELEGRAM_TOKEN_FILE: /run/secrets/q15_telegram_token
      Q15_TELEGRAM_ALLOWED_USER_IDS_FILE: /run/secrets/q15_telegram_allowed_user_ids
      BRAVE_API_KEY_FILE: /run/secrets/brave_api_key
      Q15_QDRANT_URL: http://q15-qdrant:6334
      Q15_GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
    configs:
      - source: q15_agent_config
        target: /etc/q15/agent/config.yaml
    volumes:
      - type: bind
        source: ./deploy/compose/secrets/q15_auth_json
        target: /etc/q15/auth/auth.json
        read_only: true
      - type: volume
        source: q15_workspace
        target: /workspace
      - type: volume
        source: q15_memory
        target: /memory
      - type: volume
        source: q15_media
        target: /media
      - type: volume
        source: q15_skills
        target: /skills
    secrets:
      - moonshot_api_key
      - zai_api_key
      - brave_api_key
      - gemini_api_key
      - q15_telegram_token
      - q15_telegram_allowed_user_ids

volumes:
  q15_exec_nix_store:
  q15_media:
  q15_memory:
  q15_proxy_state:
  q15_qdrant_storage:
  q15_skills:
  q15_workspace:

configs:
  q15_agent_config:
    file: ./deploy/compose/agent-config.yaml
  q15_proxy_policy:
    file: ./deploy/compose/proxy-policy.yaml

# Secret file paths below are local ignored files. Seed them from deploy/compose/secrets/*.example.
secrets:
  moonshot_api_key:
    file: ./deploy/compose/secrets/moonshot_api_key
  zai_api_key:
    file: ./deploy/compose/secrets/zai_api_key
  brave_api_key:
    file: ./deploy/compose/secrets/brave_api_key
  gemini_api_key:
    file: ./deploy/compose/secrets/gemini_api_key
  q15_telegram_token:
    file: ./deploy/compose/secrets/q15_telegram_token
  q15_telegram_allowed_user_ids:
    file: ./deploy/compose/secrets/q15_telegram_allowed_user_ids
  github_token:
    file: ./deploy/compose/secrets/github_token
