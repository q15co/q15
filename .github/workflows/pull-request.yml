name: Pull Request

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Pull Request Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache repo-local tools
        uses: actions/cache@v4
        with:
          path: .tools
          key: ${{ runner.os }}-${{ runner.arch }}-tools-${{ hashFiles('scripts/tool-versions.sh', 'go.work') }}

      - name: Install repo-local tools
        run: make project-setup

      - name: Run repo verification
        run: make verify

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
