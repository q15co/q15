name: Release q15-auth

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-auth:
    name: Release q15-auth
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work

      - name: Release q15-auth archives
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
